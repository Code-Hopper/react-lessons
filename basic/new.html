<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        /* div {
            width: 200px;

        } */

        .hide{
            display: none;
        }

        #pop-up-container{
            position: fixed;
            width: 100%;
            height: 100vh;
            top: 0;
            left: 0;
            background-color: rgba(0,0,0,.5);
        }

         #pop-up-container > .pop-up-content{
            width: 400px;
            height: 400px;
            background-color: white;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%,-50%);
         }

          #pop-up-container > .pop-up-content > #close{
            background-color: red;
            outline: none;
            border: none;
            border-radius: 100%;
            width: 20px;
            height: 20px;
            color: white;
            font-weight: bold;
            position: absolute;
            left: 100%;
            top: 0;
            transform: translate(-50%,-50%);
          }

    </style>

</head>

<body>

    <!-- <h1>dom</h1>

    </div>

    <button>change color</button>

    <button>hide element</button> -->

    <form action="">

        <input name="name" type="text" placeholder="enter your name">
        <input name="email" type="email" placeholder="enter email name">
        <input name="contact" type="tel" placeholder="enter contact name">
        <input name="dob" type="date" placeholder="enter dob name">

        <button type="submit">submit</button>
    </form>

    <br>

    <table border="1">
        <thead>
            <tr>
                <th>name</th>
                <th>email</th>
                <th>contact</th>
                <th>dob</th>
                <th>delete</th>
            </tr>
        </thead>
        <tbody>

        </tbody>
    </table>

    <button>pop up</button>

    <div id="pop-up-container" class="hide">
        <div class="pop-up-content">
            <button id="close">X</button>
        </div>
    </div>

</body>

</html>
